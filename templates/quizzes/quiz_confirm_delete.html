{% extends 'base.html' %}
{% block title %}Delete Quiz{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center animate-fade-in-up">
        <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">Delete Quiz?</h2>
        <p class="text-gray-500 mb-6">Are you sure you want to delete <strong>"{{ quiz.title }}"</strong>? This action cannot be undone.</p>
        <form method="POST" class="flex space-x-3 justify-center">
            {% csrf_token %}
            <button type="submit" class="bg-red-500 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-red-600 transition">Delete</button>
            <a href="{% url 'instructor_dashboard' %}" class="px-6 py-2.5 rounded-lg border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
